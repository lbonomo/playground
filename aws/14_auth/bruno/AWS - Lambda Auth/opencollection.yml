opencollection: 1.0.0

info:
  name: AWS - Lambda Auth
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: awsv4
    accessKeyId: "{{AWS_ACCESS_KEY_ID}}"
    secretAccessKey: "{{AWS_SECRET_ACCESS_KEY}}"
    sessionToken: ""
    service: ""
    region: "{{REGION}}"
    profileName: ""
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
